# Force linker relaxation (Xtensa call8 range)
CONFIG_LINKER_USE_RELAX=y

# Networking - minimal for OPC UA (reduced to shrink binary / help call8)
CONFIG_NETWORKING=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_PKT_RX_COUNT=2
CONFIG_NET_PKT_TX_COUNT=2
CONFIG_NET_MAX_CONTEXTS=2
CONFIG_NET_MAX_CONN=1
CONFIG_NET_TX_STACK_SIZE=1536
CONFIG_NET_RX_STACK_SIZE=1536
CONFIG_NET_SOCKETS_POLL_MAX=2
CONFIG_NET_BUF_RX_COUNT=4
CONFIG_NET_BUF_TX_COUNT=4

CONFIG_MAIN_STACK_SIZE=3072

# Minimal runtime
CONFIG_PRINTK=y
CONFIG_NEWLIB_LIBC=y
CONFIG_POSIX_API=y

# mbedTLS for open62541 encryption
# CONFIG_MBEDTLS=y
